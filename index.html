<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail de Signalement - WhatsApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #16162a;
            border-radius: 20px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
            border: 1px solid #2a2a4a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #25D366;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .logo p {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #ccc;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f23;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            transition: border 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #25D366;
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row .form-group {
            flex: 1;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #25D366;
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #1ebe5a;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.3);
        }
        .hidden {
            display: none;
        }
        #preview {
            margin-top: 20px;
            padding: 20px;
            background: #0f0f23;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
        }
        #preview h3 {
            color: #25D366;
            margin-bottom: 10px;
            font-size: 16px;
        }
        #preview .message-box {
            background: #1a1a3a;
            padding: 15px;
            border-radius: 8px;
            color: #ddd;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .whatsapp-icon {
            display: inline-block;
            margin-right: 8px;
        }
        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #888;
        }
        @media (max-width: 600px) {
            .container { padding: 25px; }
            .row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1><span class="whatsapp-icon">📱</span>Signalement WhatsApp</h1>
            <p>Formulaire de signalement sécurisé — Envoi via WhatsApp</p>
        </div>

        <form id="reportForm">
            <div class="row">
                <div class="form-group">
                    <label for="type">Type de signalement</label>
                    <select id="type" required>
                        <option value="">Sélectionner...</option>
                        <option value="Phishing">Phishing / Hameçonnage</option>
                        <option value="Spam">Spam</option>
                        <option value="Arnaque">Arnaque financière</option>
                        <option value="Hacking">Tentative de hacking</option>
                        <option value="Harcelement">Harcèlement</option>
                        <option value="Usurpation">Usurpation d'identité</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="urgence">Niveau d'urgence</label>
                    <select id="urgence" required>
                        <option value="Faible">Faible</option>
                        <option value="Moyen">Moyen</option>
                        <option value="Élevé" selected>Élevé</option>
                        <option value="Critique">Critique</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="numero">Numéro de téléphone cible (avec indicatif, ex: 33612345678)</label>
                <input type="text" id="numero" placeholder="ex: 33612345678" required>
            </div>

            <div class="form-group">
                <label for="sujet">Sujet du signalement</label>
                <input type="text" id="sujet" placeholder="ex: Tentative de phishing bancaire" required>
            </div>

            <div class="form-group">
                <label for="description">Description détaillée</label>
                <textarea id="description" placeholder="Décris le signalement en détail : date, comportement observé, captures d'écran, URLs suspectes, etc." required></textarea>
            </div>

            <div class="form-group">
                <label for="email">Ton email (pour suivi)</label>
                <input type="email" id="email" placeholder="email@exemple.com">
            </div>

            <button type="submit" class="btn">📤 Envoyer le signalement via WhatsApp</button>
        </form>

        <div id="preview" class="hidden">
            <h3>Aperçu du message qui sera envoyé</h3>
            <div class="message-box" id="messagePreview"></div>
            <div class="status">Tu vas être redirigé vers WhatsApp dans 3 secondes...</div>
        </div>
    </div>

    <script>
        document.getElementById('reportForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const type = document.getElementById('type').value;
            const urgence = document.getElementById('urgence').value;
            const numero = document.getElementById('numero').value.replace(/\s+/g, '');
            const sujet = document.getElementById('sujet').value.trim();
            const description = document.getElementById('description').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!type || !numero || !sujet || !description) {
                alert('Veuillez remplir tous les champs obligatoires.');
                return;
            }

            // Construction du message structuré
            const message = [
                `🔴 *SIGNALEMENT DE SÉCURITÉ*`,
                `------------------------------------`,
                `📋 *Type :* ${type}`,
                `🚨 *Urgence :* ${urgence}`,
                `🎯 *Numéro cible :* ${numero}`,
                `📝 *Sujet :* ${sujet}`,
                `------------------------------------`,
                `*Description :*`,
                `${description}`,
                email ? `------------------------------------\n📧 *Email de suivi :* ${email}` : '',
                `------------------------------------`,
                `🕐 Signalement envoyé le ${new Date().toLocaleString('fr-FR')}`
            ].filter(Boolean).join('\n');

            // Afficher la prévisualisation
            document.getElementById('messagePreview').textContent = message;
            document.getElementById('preview').classList.remove('hidden');

            // Encodage URL du message
            const encodedMessage = encodeURIComponent(message);

            // Redirection vers WhatsApp avec wa.me
            setTimeout(() => {
                // Utilisation du numéro de signalement officiel WhatsApp + message pré-rempli
                // Tu peux changer le numéro ci-dessous pour un numéro de réception dédié
                const whatsappNumber = numero; // envoie vers le numéro cible
                const waURL = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;
                window.open(waURL, '_blank');
            }, 3000);
        });
    </script>
</body>
</html>
